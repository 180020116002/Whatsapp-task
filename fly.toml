[app]
name = "whatsapp-tasks"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3001"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "whatsapp_data"
  destination = "/app/.wwebjs_auth"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
